name = "skiluxe-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain set via Cloudflare dashboard: api.new-gudauri.com
# routes = [{ pattern = "api.new-gudauri.com/*", custom_domain = true }]

[vars]
SITE_ORIGIN = "https://new-gudauri.com"
ALT_SITE_ORIGIN = "https://www.new-gudauri.com"
HOLD_HOURS = "24"
ICAL_OWNER_EMAIL = "stay@new-gudauri.com"

[[d1_databases]]
binding = "DB"
database_name = "skiluxe-db"
database_id = "02286124-d2cf-4314-a6d1-a5b39655a4a8"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "KV"
id = "65e8a012a774461185130b94c6e77e9e"

[triggers]
crons = ["*/15 * * * *", "*/5 * * * *"]

# Secrets (set via `wrangler secret put`):
# ADMIN_PASSWORD_HASH   pbkdf2$iterations$saltBase64$hashBase64
# SESSION_SECRET        32 random bytes (hex or base64)
# OWNER_EMAIL           e.g. stay@new-gudauri.com
# OWNER_WHATSAPP_PHONE  e.g. +9725...
# CALLMEBOT_API_KEY     CallMeBot WhatsApp key
# MAIL_FROM             noreply@new-gudauri.com
# MAIL_DKIM_DOMAIN      new-gudauri.com
# MAIL_DKIM_SELECTOR    mailchannels
# MAIL_DKIM_PRIVATE_KEY base64 of DKIM private key (PKCS8)
# MAILCHANNELS_API_KEY  from MailChannels Console → API keys
# TBC_API_KEY           Developer app API key from developers.tbcbank.ge
# TBC_CLIENT_ID         Merchant client_id from ecom.tbcpayments.ge
# TBC_CLIENT_SECRET     Merchant client_secret from ecom.tbcpayments.ge
# GEOPAY_MERCHANT_ID    From GeoPay merchant panel (e.g. 1198)
# GEOPAY_USER_ID        From GeoPay merchant panel (e.g. 1209)
# GEOPAY_HASH_SECRET    MD5 hash key — request from GeoPay (+995 32 248 70 90)
